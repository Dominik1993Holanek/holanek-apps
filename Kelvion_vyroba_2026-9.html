<html lang="cs">

<title>Kelvion – Výroba 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;}
.kv-hdr{background:#0a0d14;border-bottom:2px solid #1a2040;position:sticky;top:0;z-index:200;}
.kv-top{padding:11px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #1a2040;}
.kv-logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;}
.kv-logo span{color:#6b7799;}
.kv-tabs{display:flex;}
.kv-tab{padding:13px 36px;border:none;background:transparent;cursor:pointer;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:#6b7799;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;}
.kv-tab:hover{color:#e8eaf0;}
.kv-tab.on-vl{color:#3a8eff;border-bottom-color:#3a8eff;background:rgba(58,142,255,.07);}
.kv-tab.on-kol{color:#ff6b35;border-bottom-color:#ff6b35;background:rgba(255,107,53,.07);}
.kv-tab.on-naj{color:#00d4aa;border-bottom-color:#00d4aa;background:rgba(0,212,170,.07);}
.tdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.kv-frame{display:none;border:none;width:100%;height:calc(100vh - 96px);}
.kv-frame.on{display:block;}
.naj-wrap{display:none;padding:0;}
.naj-wrap.on{display:block;}
.naj-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.naj-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:#00d4aa;}
.naj-logo span{color:#6b7799;}
.naj-btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:.78rem;font-weight:600;font-family:'Inter',sans-serif;}
.naj-btn-g{background:#00d4aa;color:#0a1a15;}
.naj-btn-x{background:transparent;border:1px solid #2a3050;color:#6b7799;}
.naj-toast{position:fixed;bottom:18px;right:18px;background:#00d4aa;color:#0a1a15;padding:9px 15px;border-radius:8px;font-size:.82rem;font-weight:600;transform:translateY(60px);opacity:0;transition:all .3s;z-index:999;pointer-events:none;}
.naj-toast.show{transform:translateY(0);opacity:1;}
</style>
</head>

<div class="kv-hdr">

    <div class="kv-logo">Kelvion <span>/ Výroba 2026</span></div>
    <div style="font-size:.72rem;color:#6b7799;font-family:'DM Mono',monospace;">Data jsou oddelena pro kazdy modul</div>
  </div>
  <div class="kv-tabs">
    <button class="kv-tab" id="tab-vl" onclick="kvSw('vl')"><div class="tdot" style="background:#3a8eff"></div>Vlásenky</button>
    <button class="kv-tab" id="tab-kol" onclick="kvSw('kol')"><div class="tdot" style="background:#ff6b35"></div>Kolínka</button>
    <button class="kv-tab" id="tab-naj" onclick="kvSw('naj')"><div class="tdot" style="background:#00d4aa"></div>Nájem</button>
  </div>
</div>

<iframe class="kv-frame" id="fr-vl"></iframe>
<iframe class="kv-frame" id="fr-kol"></iframe>

<div class="naj-wrap" id="naj-wrap">
  <div style="padding:0 0 20px 0;">
  <div class="naj-hdr" style="padding:11px 24px;background:#181c27;border-bottom:1px solid #2a3050;position:sticky;top:96px;z-index:90;margin-bottom:0;">
    <div class="naj-logo">Nájem Kelvion <span>/ 2026</span></div>
    <div style="display:flex;gap:7px;align-items:center;flex-wrap:wrap;">

      <input type="file" id="naj-imp" accept=".json" style="display:none" onchange="najImportData(event)">
    </div>
  </div>
  <div id="naj-mnav" style="display:flex;gap:4px;flex-wrap:wrap;padding:10px 24px;background:#181c27;border-bottom:1px solid #2a3050;"></div>
  <div style="padding:18px 24px;max-width:1400px;margin:0 auto;">
  <div id="naj-ct"></div>
  </div></div>
</div>

  localStorage.setItem(KV_LAST,tab);
  document.getElementById('fr-vl').classList.toggle('on',tab==='vl');
  document.getElementById('fr-kol').classList.toggle('on',tab==='kol');
  document.getElementById('naj-wrap').classList.toggle('on',tab==='naj');
  document.getElementById('tab-vl').className='kv-tab'+(tab==='vl'?' on-vl':'');
  document.getElementById('tab-kol').className='kv-tab'+(tab==='kol'?' on-kol':'');
  document.getElementById('tab-naj').className='kv-tab'+(tab==='naj'?' on-naj':'');
  if(tab==='vl'&&!vlOk){vlOk=true;document.getElementById('fr-vl').src=VL_SRC;}
  if(tab==='kol'&&!kolOk){kolOk=true;document.getElementById('fr-kol').src=KOL_SRC;}
  if(tab==='naj'&&!najOk){najOk=true;najInit();}
}


const NAJ_SK='kelvion_najem_2026';
const NAJ_MN=['Leden','Unor','Brezen','Duben','Kveten','Cerven','Cervenec','Srpen','Zari','Rijen','Listopad','Prosinec'];
const NAJ_MS=['Led','Uno','Bre','Dub','Kve','Cvn','Cvc','Srp','Zar','Rij','Lis','Pro'];
var najD={}, najCur=new Date().getMonth()+1, najView='mes';

function najLoad(){try{najD=JSON.parse(localStorage.getItem(NAJ_SK)||'{}');}catch(e){najD={};}}
function najSave(){
  localStorage.setItem(NAJ_SK,JSON.stringify(najD));
  var e=document.getElementById('naj-sind');
  if(e){e.textContent='Ulozeno';setTimeout(function(){e.textContent='';},2000);}
}
function najGet(m){
  if(!najD[m])najD[m]={m2:0,sazba:40,stan:13500,datum:'',cislo:'',poznamka:''};
  return najD[m];
}
function najCalc(md){
  var pl=(parseFloat(md.m2)||0)*(parseFloat(md.sazba)||40);
  var st=md.stan!==undefined&&md.stan!==''?parseFloat(md.stan)||0:13500;
  var bez=pl+st;
  var dph=Math.round(bez*21)/100;
  return{pl:pl,st:st,bez:bez,dph:dph,s:bez+dph};
}
function najFmt(n){return Math.round(n||0).toLocaleString('cs-CZ')+' Kc';}
function najToast(msg){
  var t=document.getElementById('naj-toast');
  if(!t)return;
  t.textContent=msg;t.className='naj-toast show';
  setTimeout(function(){t.className='naj-toast';},2500);
}

function najExportJSON(){
  var stamp=new Date().toISOString().slice(0,10);
  var b=new Blob([JSON.stringify(najD,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='kelvion_najem_'+stamp+'.json';a.click();
  najToast('Zalozeno!');
}
function najImportClick(){document.getElementById('naj-imp').click();}
function najImportData(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{najD=JSON.parse(ev.target.result);najSave();najBuildNav();najRender();}
    catch(err){alert(err.message);}
  };
  r.readAsText(f);e.target.value='';
}
function najExportCSV(){
  var rows=[['Mesic','m2','Sazba','Plocha','Stan','Bez DPH','DPH','S DPH','Datum','Cislo','Poznamka']];
  for(var m=1;m<=12;m++){var md=najGet(m);var t=najCalc(md);rows.push([NAJ_MN[m-1],md.m2,md.sazba,t.pl,md.stan,t.bez,t.dph,t.s,md.datum,md.cislo,md.poznamka]);}
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(';');}).join('\n');
  var b=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='kelvion_najem.csv';a.click();
}

function najSetView(v){
  najView=v;
  var bm=document.getElementById('naj-btn-mes');
  var bp=document.getElementById('naj-btn-pre');
  var mn=document.getElementById('naj-mnav');
  if(bm){bm.style.background=v==='mes'?'#ff6b35':'transparent';bm.style.color=v==='mes'?'#fff':'#6b7799';bm.style.border=v==='mes'?'none':'1px solid #2a3050';}
  if(bp){bp.style.background=v==='pre'?'#ff6b35':'transparent';bp.style.color=v==='pre'?'#fff':'#6b7799';bp.style.border=v==='pre'?'none':'1px solid #2a3050';}
  if(mn)mn.style.display=v==='mes'?'flex':'none';
  najRender();
}

function najBuildNav(){
  var nav=document.getElementById('naj-mnav');if(!nav)return;
  nav.innerHTML='';
  for(var m=1;m<=12;m++){
    (function(mm){
      var md=najD[mm],has=md&&(parseFloat(md.m2)>0||md.cislo);
      var b=document.createElement('button');
      b.textContent=NAJ_MS[mm-1];
      b.style.cssText='padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.8rem;font-weight:600;font-family:Inter,sans-serif;margin:1px;background:'+(mm===najCur?'#00d4aa':'transparent')+';color:'+(mm===najCur?'#0a1a15':has?'#00a07a':'#6b7799')+';border:1px solid '+(mm===najCur?'#00d4aa':has?'#004a3a':'#2a3050')+';';
      b.onclick=function(){najCur=mm;najBuildNav();najRender();};
      nav.appendChild(b);
    })(m);
  }
}

function najSF(f,v){var md=najGet(najCur);var n=parseFloat(v);md[f]=isNaN(n)?0:n;najSave();}
function najSS(f,v){najGet(najCur)[f]=v;najSave();najRender();}

function najCard(cls,top_col,lbl,val,sub){
  return '<div style="background:#181c27;border:1px solid #2a3050;border-radius:10px;padding:14px;position:relative;overflow:hidden;">'+
    '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:'+top_col+';"></div>'+
    '<div style="font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:#6b7799;margin-bottom:5px;font-family:DM Mono,monospace;">'+lbl+'</div>'+
    '<div style="font-size:1.15rem;font-weight:700;font-family:Syne,sans-serif;'+cls+'">'+val+'</div>'+
    (sub?'<div style="font-size:.7rem;color:#6b7799;margin-top:3px;">'+sub+'</div>':'')+
  '</div>';
}
function najChk(cls,icon,txt){
  var bg={'ok':'rgba(0,212,170,.08)','warn':'rgba(247,201,72,.08)','err':'rgba(255,107,107,.08)'};
  var bd={'ok':'rgba(0,212,170,.2)','warn':'rgba(247,201,72,.25)','err':'rgba(255,107,107,.25)'};
  var col={'ok':'#00d4aa','warn':'#f7c948','err':'#ff6b6b'};
  return '<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:8px;font-size:.83rem;margin-bottom:6px;background:'+bg[cls]+';border:1px solid '+bd[cls]+';color:'+col[cls]+';">'+icon+' '+txt+'</div>';
}

function najRender(){
  if(najView==='pre'){najRenderPre();return;}
  var m=najCur, md=najGet(m), t=najCalc(md);
  var el=document.getElementById('naj-ct');if(!el)return;
  var chks='';
  if(!md.m2||parseFloat(md.m2)===0)chks+=najChk('err','!','m2 venkovni plochy jsou 0.');
  else chks+=najChk('ok','OK','Plocha: '+md.m2+' m2 x '+md.sazba+' Kc = '+najFmt(t.pl));
  if(!md.datum)chks+=najChk('warn','?','Chybi datum faktury.');
  else chks+=najChk('ok','OK','Datum: '+md.datum);
  if(!md.cislo)chks+=najChk('err','!','Chybi cislo faktury.');
  else chks+=najChk('ok','OK','Cislo: '+md.cislo);
  if(t.bez===0)chks+=najChk('err','!','Celkova castka je 0 Kc.');

  var stanVal=md.stan!==undefined&&md.stan!==''?md.stan:13500;

  el.innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;">'+
      najCard('','#3a8eff','Plocha bez DPH',najFmt(t.pl),md.m2+'m2 x '+(md.sazba||40)+'Kc')+
      najCard('','#a855f7','Stan bez DPH',najFmt(stanVal),'fixni mesicne')+
      najCard('','#f7c948','Celkem bez DPH',najFmt(t.bez),'zaklad dane')+
      najCard('color:#ff6b6b','#ff6b6b','DPH 21%',najFmt(t.dph),'')+
      najCard('color:#00d4aa','#00d4aa','Celkem s DPH',najFmt(t.s),'k uhrade')+
    '</div>'+
    '<div style="background:#181c27;border:1px solid #2a3050;border-radius:12px;margin-bottom:12px;overflow:hidden;">'+

          'oninput="najSF(\'m2\',this.value)" onblur="najRender()"></div>'+
        '<div style="margin-bottom:10px;"><label style="font-size:.7rem;color:#6b7799;display:block;margin-bottom:3px;">SAZBA Kc/m2</label>'+

          'oninput="najSF(\'sazba\',this.value)" onblur="najRender()"></div>'+
        '<div style="background:rgba(58,142,255,.1);border:1px solid rgba(58,142,255,.2);border-radius:8px;padding:10px;display:flex;justify-content:space-between;">'+
          '<span style="color:#6b7799;font-size:.8rem;">Plocha bez DPH</span><strong style="color:#3a8eff;">'+najFmt(t.pl)+'</strong></div>'+
      '</div>'+
      '<div style="background:#181c27;border:1px solid #2a3050;border-radius:12px;padding:16px;">'+
        '<div style="font-family:Syne,sans-serif;font-size:.88rem;font-weight:700;color:#a855f7;margin-bottom:12px;">Pronajem stanu</div>'+
        '<div style="margin-bottom:10px;"><label style="font-size:.7rem;color:#6b7799;display:block;margin-bottom:3px;">CASTKA Kc/MESIC</label>'+
          '<input type="number" id="naj-stan" value="'+stanVal+'" step="100" min="0" '+
          'style="width:100%;background:#0f1117;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:8px 10px;font-family:DM Mono,monospace;font-size:.9rem;outline:none;" '+
          'oninput="najSF(\'stan\',this.value)" onblur="najRender()">'+
          '<div style="font-size:.7rem;color:#6b7799;margin-top:4px;">Vychozi 13500 Kc</div></div>'+
        '<div style="background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);border-radius:8px;padding:10px;display:flex;justify-content:space-between;">'+
          '<span style="color:#6b7799;font-size:.8rem;">Stan bez DPH</span><strong style="color:#a855f7;">'+najFmt(stanVal)+'</strong></div>'+
      '</div>'+
    '</div>'+
    '<div style="background:#181c27;border:1px solid #2a3050;border-radius:12px;padding:16px;margin-bottom:12px;">'+
      '<div style="font-family:Syne,sans-serif;font-size:.88rem;font-weight:700;color:#f7c948;margin-bottom:12px;">Faktura</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;">'+
        '<div><label style="font-size:.7rem;color:#6b7799;display:block;margin-bottom:3px;">DATUM</label>'+
          '<input type="text" value="'+(md.datum||'')+'" placeholder="dd.mm.yyyy" '+
          'style="width:100%;background:#0f1117;border:1px solid #2a3050;border-radius:6px;color:#e8eaf0;padding:8px 10px;font-size:.88rem;outline:none;" '+
          'onblur="najSS(\'datum\',this.value)"></div>'+
        '<div><label style="font-size:.7rem;color:#6b7799;display:block;margin-bottom:3px;">CISLO FAKTURY</label>'+
          '<input type="text" value="'+(md.cislo||'')+'" placeholder="2026-xxx" '+

function najRenderPre(){
  var el=document.getElementById('naj-ct');if(!el)return;
  var ms=[],rp=0,rs=0,rb=0,rd=0,rsd=0;
  for(var m=1;m<=12;m++){var md=najGet(m);var t=najCalc(md);ms.push({m:m,l:NAJ_MS[m-1],n:NAJ_MN[m-1],md:md,t:t});rp+=t.pl;rs+=t.st;rb+=t.bez;rd+=t.dph;rsd+=t.s;}
  var hasD=ms.some(function(m){return m.t.bez>0;});
  var fK=function(n){return Math.abs(n)>=1000?(n/1000).toFixed(0)+'k':Math.round(n).toString();};
  var ch='';
  if(hasD){
    var maxV=Math.max.apply(null,ms.map(function(m){return m.t.s;}).concat([1]));
    var H=160,PL=44,PB=28,PT=14,BW=13,GW=54,TW=PL+12*GW+6;
    var toY=function(v){return H-PB-(v/maxV)*(H-PT-PB);};
    var svg='<svg viewBox="0 0 '+TW+' '+H+'" style="width:100%;height:'+H+'px;overflow:visible;">';
    [0,0.5,1].forEach(function(f){var v=maxV*f;var y=toY(v);svg+='<line x1="'+(PL-5)+'" y1="'+y+'" x2="'+(TW-5)+'" y2="'+y+'" stroke="#2a3050" stroke-width="1"/><text x="'+(PL-7)+'" y="'+(y+4)+'" text-anchor="end" style="font-family:DM Mono,monospace;font-size:10px;fill:#6b7799;">'+fK(v)+'</text>';});
    ms.forEach(function(mo,i){
      var x=PL+i*GW;
      [{v:mo.t.pl,c:'#3a8eff'},{v:mo.t.st,c:'#a855f7'},{v:mo.t.s,c:'#00d4aa'}].forEach(function(b,bi){
        var bx=x+bi*(BW+1)+1,bh=(b.v/maxV)*(H-PT-PB),by=toY(b.v);
        if(bh>1)svg+='<rect x="'+bx+'" y="'+by+'" width="'+BW+'" height="'+Math.max(bh,1)+'" fill="'+b.c+'" rx="2" opacity=".82"/>';
      });
      svg+='<text x="'+(x+GW/2-3)+'" y="'+(H-3)+'" text-anchor="middle" style="font-family:DM Mono,monospace;font-size:10px;fill:#6b7799;">'+mo.l+'</text>';
    });
    svg+='</svg>';
    ch='<div style="background:#181c27;border:1px solid #2a3050;border-radius:12px;padding:16px;margin-bottom:12px;">'+
      '<div style="font-family:Syne,sans-serif;font-size:.88rem;font-weight:700;margin-bottom:12px;">Najem po mesicich 2026</div>'+
      '<div style="overflow-x:auto;">'+svg+'</div>'+
      '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:.74rem;">'+
        '<div style="display:flex;align-items:center;gap:4px;color:#6b7799;"><div style="width:9px;height:9px;border-radius:2px;background:#3a8eff;"></div>Plocha</div>'+
        '<div style="display:flex;align-items:center;gap:4px;color:#6b7799;"><div style="width:9px;height:9px;border-radius:2px;background:#a855f7;"></div>Stan</div>'+
        '<div style="display:flex;align-items:center;gap:4px;color:#6b7799;"><div style="width:9px;height:9px;border-radius:2px;background:#00d4aa;"></div>S DPH</div>'+
      '</div></div>';
  }
  var tbl='<div style="background:#181c27;border:1px solid #2a3050;border-radius:12px;overflow:hidden;">'+
    '<div style="padding:10px 16px;background:#1e2334;font-family:Syne,sans-serif;font-size:.88rem;font-weight:700;">Prehled po mesicich</div>'+
    '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:.8rem;">'+
    '<thead><tr style="border-bottom:1px solid #2a3050;">'+
      ['Mesic','m2','Plocha','Stan','Bez DPH','S DPH','Faktura'].map(function(h){return '<th style="text-align:'+(h==='Mesic'||h==='Faktura'?'left':'right')+';padding:7px 10px;color:#6b7799;font-size:.67rem;text-transform:uppercase;font-family:DM Mono,monospace;">'+h+'</th>';}).join('')+
    '</tr></thead><tbody>'+
    ms.map(function(mo){
      return '<tr style="border-bottom:1px solid #2a3050;cursor:pointer;" onclick="najSetView(\'mes\');najCur='+mo.m+';najBuildNav();najRender();" onmouseover="this.style.background=\'#1e2334\'" onmouseout="this.style.background=\'\'">'+
        '<td style="padding:7px 10px;font-weight:600;">'+mo.n+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-family:DM Mono,monospace;">'+(mo.md.m2||'—')+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-family:DM Mono,monospace;color:#3a8eff;">'+(mo.t.pl>0?najFmt(mo.t.pl):'—')+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-family:DM Mono,monospace;color:#a855f7;">'+najFmt(mo.t.st)+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-family:DM Mono,monospace;font-weight:600;">'+(mo.t.bez>0?najFmt(mo.t.bez):'—')+'</td>'+
        '<td style="padding:7px 10px;text-align:right;font-family:DM Mono,monospace;font-weight:700;color:#00d4aa;">'+(mo.t.s>0?najFmt(mo.t.s):'—')+'</td>'+
        '<td style="padding:7px 10px;font-family:DM Mono,monospace;font-size:.76rem;color:#6b7799;">'+(mo.md.cislo||'<span style="color:#ff6b6b">chybi</span>')+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div></div>';

  el.innerHTML=
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px;">'+
      najCard('','#3a8eff','Plocha rok',najFmt(rp),'')+
      najCard('','#a855f7','Stan rok',najFmt(rs),'')+
      najCard('','#f7c948','Bez DPH rok',najFmt(rb),'')+
      najCard('color:#ff6b6b','#ff6b6b','DPH rok',najFmt(rd),'')+
      najCard('color:#00d4aa','#00d4aa','S DPH rok',najFmt(rsd),'')+
    '</div>'+ch+tbl;
}

function najInit(){
  najLoad();
  for(var m=12;m>=1;m--){var md=najD[m];if(md&&(parseFloat(md.m2)>0||md.cislo)){najCur=m;break;}}
  najBuildNav();najRender();
}


kvSw(localStorage.getItem(KV_LAST)||'vl');
</script>
