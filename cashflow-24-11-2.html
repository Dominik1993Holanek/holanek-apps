<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Prehled</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--s:#181c27;--s2:#1e2334;--bd:#2a3050;--a:#4f7fff;--a2:#00d4aa;--a3:#ff6b6b;--a4:#f7c948;--tx:#e8eaf0;--mu:#6b7799;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
header{background:var(--s);border-bottom:1px solid var(--bd);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
.logo span{color:var(--mu);}
nav{display:flex;gap:4px;padding:10px 24px;background:var(--s);border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.tb,.stb{padding:6px 14px;border:1px solid var(--bd);border-radius:6px;background:transparent;color:var(--mu);cursor:pointer;font-size:0.8rem;font-weight:600;font-family:'Inter',sans-serif;}
.tb:hover,.stb:hover{border-color:var(--a);color:var(--a);}
.tb.on,.stb.on{background:var(--a);border-color:var(--a);color:white;}
.ct{padding:20px 24px;max-width:1300px;margin:0 auto;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
.card{background:var(--s);border:1px solid var(--bd);border-radius:10px;padding:15px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--a);}
.card.c2::before{background:var(--a2);}
.card.c3::before{background:var(--a3);}
.card.c4::before{background:var(--a4);}
.card.c5::before{background:#a855f7;}
.cl{font-size:0.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:6px;font-family:'DM Mono',monospace;}
.cv{font-size:1.25rem;font-weight:700;font-family:'Syne',sans-serif;}
.cs{font-size:0.68rem;color:var(--mu);margin-top:4px;}
.sec{background:var(--s);border:1px solid var(--bd);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.sh{padding:12px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--s2);}
.st{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;}
.sb{padding:18px;}
.btn{padding:6px 12px;border-radius:6px;border:none;cursor:pointer;font-size:0.8rem;font-weight:600;font-family:'Inter',sans-serif;}
.bp{background:var(--a);color:white;}
.bg{background:transparent;border:1px solid var(--bd);color:var(--mu);}
.bg:hover{border-color:var(--a);color:var(--a);}
.bd2{background:transparent;border:1px solid #3a1a1a;color:var(--a3);}
.bsm{padding:4px 9px;font-size:0.74rem;}
input[type=text],input[type=number],input[type=date],select{background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tx);padding:7px 11px;font-size:0.85rem;font-family:'Inter',sans-serif;outline:none;}
input:focus,select:focus{border-color:var(--a);}
label{font-size:0.74rem;color:var(--mu);display:block;margin-bottom:3px;}
.fg{display:flex;flex-direction:column;gap:3px;}
.tbl{width:100%;border-collapse:collapse;font-size:0.82rem;}
.tbl th{background:var(--s2);color:var(--mu);padding:8px 12px;text-align:left;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--bd);}
.tbl th.r{text-align:right;}
.tbl td{padding:8px 12px;border-bottom:1px solid var(--bd);}
.tbl td.r{text-align:right;font-family:'DM Mono',monospace;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,0.015);}
.dbtn{cursor:pointer;color:var(--a3);border:none;background:none;font-size:0.85rem;padding:2px 5px;opacity:0;}
.tbl tr:hover .dbtn{opacity:1;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;align-items:center;justify-content:center;}
.mo.op{display:flex;}
.mb{background:var(--s);border:1px solid var(--bd);border-radius:12px;padding:24px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.mb h3{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:16px;}
.mbt{display:flex;gap:8px;margin-top:18px;justify-content:flex-end;}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.ai{background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:11px;}
.ai label{font-size:0.68rem;color:var(--mu);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.8px;}
.ai input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--bd);border-radius:0;padding:3px 0;font-family:'DM Mono',monospace;font-size:0.95rem;color:var(--tx);}
.ai input:focus{border-bottom-color:var(--a);outline:none;}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;}
.nd{text-align:center;padding:36px;color:var(--mu);font-size:0.85rem;}
.up{color:var(--a2);}
.dn{color:var(--a3);}
.backup-panel{background:linear-gradient(135deg,rgba(79,127,255,.12),rgba(0,212,170,.08));border:1px solid var(--bd);border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.backup-warn{color:#f7c948;font-weight:700;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--a2);color:#0a1a15;padding:9px 16px;border-radius:8px;font-size:0.84rem;font-weight:600;transform:translateY(50px);opacity:0;transition:all 0.3s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}
.app-frame{width:100%;border:none;border-radius:12px;background:transparent;display:block;}
.zona{border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;}
.zona-icon{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:800;color:#0f1117;flex-shrink:0;text-align:center;}
#chtip{position:fixed;pointer-events:none;background:#1e2334;border:1px solid #2a3050;color:#e8eaf0;padding:7px 13px;border-radius:8px;font-family:'DM Mono',monospace;font-size:0.78rem;white-space:nowrap;z-index:9999;opacity:0;transition:opacity 0.15s;box-shadow:0 4px 20px rgba(0,0,0,0.5);}
</style>
</head>

<div id="chtip"></div>
<header>
  <div class="logo">Finance <span>/ Prehled</span></div>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="si" style="font-size:0.75rem;color:var(--a2);font-family:'DM Mono',monospace;"></span>
    <button class="btn bg bsm" onclick="expD()">Export</button>
    <button class="btn bg bsm" onclick="document.getElementById('impF').click()">Import</button>
    <input type="file" id="impF" accept=".json" style="display:none" onchange="impD(event)">
  </div>
</header>
<nav>
  <button class="tb on" id="tb-cashflow" onclick="goTab('cashflow')">Cashflow</button>
  <button class="tb" id="tb-prehled" onclick="goTab('prehled')">Prehled</button>
  <button class="tb" id="tb-zadat" onclick="goTab('zadat')">Zadat tyden</button>
  <button class="tb" id="tb-historie" onclick="goTab('historie')">Historie</button>
  <button class="tb" id="tb-uvery" onclick="goTab('uvery')">Uvery a Leasingy</button>
  <button class="tb" id="tb-rezie" onclick="goTab('rezie')">Rezie a Investice</button>
  <button class="tb" id="tb-odmeny" onclick="goTab('odmeny')">Odmeny</button>
  <button class="tb" id="tb-vyplaty" onclick="goTab('vyplaty')">Vyplaty</button>
  <button class="tb" id="tb-osobni" onclick="goTab('osobni')">Osobni finance</button>
  <button class="tb" id="tb-firemni" onclick="goTab('firemni')">Firemni finance</button>
</nav>

<script>
function load(){
  try{var s=localStorage.getItem(SK);if(s)dat=JSON.parse(s);}catch(e){}
  if(!dat.weeks)dat.weeks=[];
  // Automaticke snizeni "zbyva" podle probehlych splatek od posledniho otevreni
  checkUveryAutoReduce();
}
function checkUveryAutoReduce(){
  if(!dat.uvery||!dat.uvery.length)return;
  var today=new Date();today.setHours(0,0,0,0);
  var lastCheck=dat.lastUveryCheck?new Date(dat.lastUveryCheck):null;
  // Pokud jeste nikdy nebezela kontrola, ulozime dnesni datum a skoncime
  if(!lastCheck){dat.lastUveryCheck=today.toISOString().slice(0,10);return;}
  var changed=false;
  for(var i=0;i<dat.uvery.length;i++){
    var u=dat.uvery[i];
    if(!u.aktiv||!u.splatka||u.zbyva<=0)continue;
    var den=u.den||1;
    // Projdeme kazdy mesic od lastCheck do dnes a hledame, jestli probehl den splatky
    var d=new Date(lastCheck.getFullYear(),lastCheck.getMonth(),den);
    // Posuneme o 1 mesic dopredu pokud ten mesicni den uz byl pred lastCheck
    if(d<=lastCheck)d=new Date(d.getFullYear(),d.getMonth()+1,den);
    while(d<=today){
      // Probehl splatkovy den — odecteme splatku
      u.zbyva=Math.max(0,((+u.zbyva||0)-(+u.splatka||0)));
      changed=true;
      d=new Date(d.getFullYear(),d.getMonth()+1,den);
    }
  }
  dat.lastUveryCheck=today.toISOString().slice(0,10);
  if(changed)save();
}
function showTip(evt,txt){var t=document.getElementById('chtip');if(!t)return;t.textContent=txt;t.style.opacity=1;t.style.left=(evt.clientX+14)+'px';t.style.top=(evt.clientY-36)+'px';}
function hideTip(){var t=document.getElementById('chtip');if(t)t.style.opacity=0;}
document.addEventListener('mousemove',function(e){var t=document.getElementById('chtip');if(t&&t.style.opacity==='1'){t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-36)+'px';}});
function save(){localStorage.setItem(SK,JSON.stringify(dat));var e=document.getElementById('si');if(e){e.textContent='Ulozeno';setTimeout(function(){e.textContent='';},2000);}}
function expD(){var b=new Blob([JSON.stringify(dat,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(b);var now=new Date();var stamp=now.toISOString().slice(0,10);a.download='finance_backup_'+stamp+'.json';a.click();localStorage.setItem(SK+'_lastBackup',now.toISOString());toast('Záloha stažena. Ulož ji na iCloud/Drive!');render();}
function impD(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{dat=JSON.parse(ev.target.result);save();render();toast('Importovano');}catch(err){alert(err.message);}};r.readAsText(f);}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function tdStr(){return new Date().toISOString().slice(0,10);}
function fmtD(s){if(!s)return'--';var d=new Date(s);return d.toLocaleDateString('cs-CZ');}
function fmtK(n){if(n===null||n===undefined)return'--';return(+n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0})+' Kc';}
function fmtN(n){if(n===null||n===undefined)return'--';return(+n||0).toLocaleString('cs-CZ',{maximumFractionDigits:0});}
function ucetKc(w,u){var v=parseFloat(w[u.key])||0;return u.sfx==='EUR'?v*EUR:v;}
function totalKc(w){if(!w)return 0;var s=0;for(var i=0;i<UCTY.length;i++)s+=ucetKc(w,UCTY[i]);s+=parseFloat(w.pokladna)||0;return s;}
function skupKc(w,g){if(!w)return 0;var s=0;for(var i=0;i<UCTY.length;i++)if(UCTY[i].g===g)s+=ucetKc(w,UCTY[i]);return s;}

function goTab(t){curTab=t;var b=document.querySelectorAll('nav .tb');for(var i=0;i<b.length;i++)b[i].classList.remove('on');var e=document.getElementById('tb-'+t);if(e)e.classList.add('on');render();}
function render(){var e=document.getElementById('ct');if(curTab==='prehled')e.innerHTML=rPrehled();else if(curTab==='zadat')e.innerHTML=rZadat();else if(curTab==='historie')e.innerHTML=rHistorie();else if(curTab==='uvery')e.innerHTML=rUvery();else if(curTab==='rezie')e.innerHTML=rRezie();else if(curTab==='odmeny')e.innerHTML=rOdmeny();else if(curTab==='vyplaty')e.innerHTML=rVyplaty();else if(curTab==='cashflow')e.innerHTML=rCashflow();else if(curTab==='osobni')e.innerHTML=rOsobniFinance();else if(curTab==='firemni')e.innerHTML=rFiremniFinance();}

function rPrehled(){
  var wks=dat.weeks.slice().sort(function(a,b){return a.datum<b.datum?-1:1;});
  var last=wks[wks.length-1],prev=wks[wks.length-2];
  if(!last)return '<div class="nd">Zadna data. Pouzijte zalozku Zadat tyden.</div>';
  var tot=totalKc(last),ptot=prev?totalKc(prev):null;
  function tH(v,pv){if(pv===null||pv===undefined)return'';var d=v-pv,pct=pv?(d/pv*100):0;return '<div class="cs '+(d>0?'up':d<0?'dn':'')+'">'+(d>=0?'+ ':'')+fmtK(d)+' ('+pct.toFixed(1)+'%)</div>';}
  var html='<div class="cards">';
  html+='<div class="card"><div class="cl">Celkovy majetek</div><div class="cv">'+fmtK(tot)+'</div><div class="cs">'+fmtD(last.datum)+'</div>'+tH(tot,ptot)+'</div>';

function mkSmoothPath(pts){
  if(pts.length<2)return'';
  var d='M'+pts[0][0]+','+pts[0][1];
  for(var i=1;i<pts.length;i++){
    var p0=pts[i-1],p1=pts[i];
    var cpx=(p0[0]+p1[0])/2;
    d+=' C'+cpx+','+p0[1]+' '+cpx+','+p1[1]+' '+p1[0]+','+p1[1];
  }
  return d;
}
function mkAreaPath(pts,baseY){
  if(pts.length<2)return'';
  var d=mkSmoothPath(pts);
  d+=' L'+pts[pts.length-1][0]+','+baseY+' L'+pts[0][0]+','+baseY+' Z';
  return d;
}
function buildChart(wks,lines,title,chartId){
  var PL=72,PR=24,PT=24,PB=44,H=280;
  var W=900;
  var TW=W+PL+PR;
  var CH=H-PT-PB;
  var allVals=[];
  for(var li=0;li<lines.length;li++)for(var wi=0;wi<wks.length;wi++)allVals.push(lines[li].fn(wks[wi]));
  var minV=Math.min.apply(null,allVals),maxV=Math.max.apply(null,allVals);
  var pad=(maxV-minV)*0.12||maxV*0.1||10000;
  minV=Math.max(0,minV-pad);maxV=maxV+pad;
  var rng=maxV-minV||1;
  function toY(v){return H-PB-Math.round(((v-minV)/rng)*CH);}
  function toX(wi){return PL+Math.round(wi*(W/(wks.length-1||1)));}
  var baseY=H-PB;

  var defs='<defs>';
  for(var li=0;li<lines.length;li++){
    var L=lines[li];
    defs+='<linearGradient id="grad_'+chartId+'_'+li+'" x1="0" y1="0" x2="0" y2="1">';
    defs+='<stop offset="0%" stop-color="'+L.c+'" stop-opacity="0.28"/>';
    defs+='<stop offset="100%" stop-color="'+L.c+'" stop-opacity="0.02"/>';
    defs+='</linearGradient>';
  }
  defs+='</defs>';

  var svg='<svg id="'+chartId+'" width="100%" viewBox="0 0 '+TW+' '+H+'" style="display:block;overflow:visible;">';
  svg+=defs;

  // Grid
  for(var gi=0;gi<=4;gi++){
    var gv=minV+(rng*gi/4),gy=toY(gv);
    svg+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(TW-PR)+'" y2="'+gy+'" stroke="#1e2334" stroke-width="1"/>';
    svg+='<text x="'+(PL-8)+'" y="'+(gy+4)+'" text-anchor="end" font-family="DM Mono,monospace" font-size="10" fill="#3d4f72">'+Math.round(gv/1000)+'k</text>';
  }

  // Areas (bottom to top order — thinner lines on top)
  for(var li=0;li<lines.length;li++){
    var L=lines[li],pts=[];
    for(var wi=0;wi<wks.length;wi++)pts.push([toX(wi),toY(L.fn(wks[wi]))]);
    svg+='<path d="'+mkAreaPath(pts,baseY)+'" fill="url(#grad_'+chartId+'_'+li+')" />';
  }

  // Lines & dots
  for(var li=0;li<lines.length;li++){
    var L=lines[li],pts=[];
    for(var wi=0;wi<wks.length;wi++)pts.push([toX(wi),toY(L.fn(wks[wi]))]);
    svg+='<path d="'+mkSmoothPath(pts)+'" fill="none" stroke="'+L.c+'" stroke-width="'+(li===0?'2.5':'2')+'" stroke-linecap="round" stroke-linejoin="round"/>';
    for(var wi=0;wi<wks.length;wi++){
      var cx=pts[wi][0],cy=pts[wi][1],val=L.fn(wks[wi]);
      svg+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#0f1117" stroke="'+L.c+'" stroke-width="2" class="chart-dot" style="cursor:pointer;" onmouseenter="showTip(evt,\''+fmtK(val)+' — '+L.label+'\')" onmouseleave="hideTip()"/>';
    }
  }

  // X labels
  var step=Math.max(1,Math.ceil(wks.length/8));
  for(var wi=0;wi<wks.length;wi+=step){
    var d=new Date(wks[wi].datum),dd=d.getDate(),dm=d.getMonth()+1;
    svg+='<text x="'+toX(wi)+'" y="'+(H-6)+'" text-anchor="middle" font-family="DM Mono,monospace" font-size="10" fill="#3d4f72">'+(dd<10?'0':'')+dd+'.'+(dm<10?'0':'')+dm+'.</text>';
  }
  svg+='</svg>';

  // Legend
  var legend='<div style="display:flex;gap:18px;flex-wrap:wrap;padding:0 0 14px 0;">';
  for(var li=0;li<lines.length;li++){
    var L=lines[li];
    legend+='<div style="display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--mu);">';
    legend+='<svg width="28" height="10"><line x1="0" y1="5" x2="18" y2="5" stroke="'+L.c+'" stroke-width="2.5" stroke-linecap="round"/><circle cx="22" cy="5" r="3.5" fill="#0f1117" stroke="'+L.c+'" stroke-width="2"/></svg>';
    legend+=L.label+'</div>';
  }
  legend+='</div>';

  return '<div class="sec"><div class="sh"><div class="st">'+title+'</div></div><div class="sb" style="overflow-x:auto;padding-bottom:8px;">'+legend+svg+'</div></div>';
}

function rChart(wks){
  var lines=[
    {c:'#e8eaf0',label:'Celkem',fn:function(w){return totalKc(w);}},

function uvNextDate(den){
  // Vrátí datum příští platby (tento nebo příští měsíc) pro daný den v měsíci
  var t=new Date();t.setHours(0,0,0,0);
  var d=new Date(t.getFullYear(),t.getMonth(),den);
  if(d<=t)d=new Date(t.getFullYear(),t.getMonth()+1,den);
  return d;
}

function uvNextDates(den,months){
  // Vrátí pole příštích N dat plateb
  var t=new Date();t.setHours(0,0,0,0);
  var dates=[];
  var start=new Date(t.getFullYear(),t.getMonth(),den);
  if(start<=t)start=new Date(t.getFullYear(),t.getMonth()+1,den);
  for(var i=0;i<months;i++){
    var d=new Date(start.getFullYear(),start.getMonth()+i,den);
    dates.push(d);
  }
  return dates;
}

// Vrátí pole {splatnost, castka} pro cashflow graf — příštích 60 dní
function uvGetCashflowItems(days){
  ensureUV();
  var today=new Date();today.setHours(0,0,0,0);
  var items=[];
  var L=dat.leasingy,U=dat.uvery;
  // Kolik měsíců dopředu potřebujeme (60 dní = max 3 měsíce)
  var months=3;
  for(var i=0;i<L.length;i++){
    if(!L[i].aktiv)continue;
    var cel=(+L[i].uvery||0)+(+L[i].poj||0)+(+L[i].urok||0);
    if(!cel)continue;
    var dates=uvNextDates(L[i].den||1,months);
    for(var j=0;j<dates.length;j++){
      var diff=Math.ceil((dates[j]-today)/86400000);
      if(diff>=0&&diff<days)items.push({splatnost:dates[j].toISOString().slice(0,10),castka:cel,nazev:L[i].nazev});
    }
  }
  for(var i=0;i<U.length;i++){
    if(!U[i].aktiv)continue;
    if(!U[i].splatka)continue;
    var dates=uvNextDates(U[i].den||1,months);
    for(var j=0;j<dates.length;j++){
      var diff=Math.ceil((dates[j]-today)/86400000);
      if(diff>=0&&diff<days)items.push({splatnost:dates[j].toISOString().slice(0,10),castka:U[i].splatka,nazev:U[i].nazev});
    }
  }
  return items;
}

function rCFChart(nezapl,nezavz,bal,today){
  var days=60;
  var dayData=[];
  var run=bal;

  // Faktury po splatnosti přidáme na den 0 (dnes)
  var overdueInc=0,overdueOut=0,overdueItems=[];
  for(var i=0;i<nezapl.length;i++){
    if(nezapl[i].splatnost&&new Date(nezapl[i].splatnost)<today){
      overdueInc+=(nezapl[i].dluh||0);
      overdueItems.push(nezapl[i].nazev.split(' ').slice(0,2).join(' '));
    }
  }
  for(var i=0;i<nezavz.length;i++){
    if(nezavz[i].splatnost&&new Date(nezavz[i].splatnost)<today){
      overdueOut+=(+nezavz[i].castka||0);
    }
  }

  var uvItems=uvGetCashflowItems(days);

  for(var di=0;di<days;di++){
    var d=new Date(today);d.setDate(today.getDate()+di);
    var ds=d.toISOString().slice(0,10);
    var inc=0,out=0,items=[];

    // Den 0 = dnes: přičti všechno co je po splatnosti
    if(di===0){inc+=overdueInc;out+=overdueOut;items=items.concat(overdueItems);}

    for(var i=0;i<nezapl.length;i++){if(nezapl[i].splatnost===ds){inc+=(nezapl[i].dluh||0);items.push(nezapl[i].nazev.split(' ').slice(0,2).join(' '));}}
    for(var i=0;i<nezavz.length;i++){if(nezavz[i].splatnost===ds){out+=(+nezavz[i].castka||0);}}
    for(var i=0;i<uvItems.length;i++){if(uvItems[i].splatnost===ds){out+=uvItems[i].castka;}}
    run+=inc-out;
    dayData.push({d:d,ds:ds,inc:inc,out:out,run:run,items:items});
  }
  // SVG chart
  var PL=70,PR=20,PT=30,PB=50,H=200,W=Math.min(1100,window.innerWidth-120)||900;
  var TW=W+PL+PR;
  var runs=dayData.map(function(x){return x.run;});
  var incs=dayData.map(function(x){return x.inc;});
  var minV=Math.min.apply(null,runs)*1.05;
  var maxV=Math.max.apply(null,runs.concat(incs))*1.05;
  if(minV===maxV){minV=minV*0.9;maxV=maxV*1.1;}
  var rng=maxV-minV||1,CH=H-PT-PB;
  function toY(v){return H-PB-Math.round(((v-minV)/rng)*CH);}
  var DW=Math.floor(W/days);
  var svg='<svg width="100%" viewBox="0 0 '+TW+' '+H+'">';
  // Grid lines
  for(var gi=0;gi<=4;gi++){var gv=minV+(rng*gi/4),gy=toY(gv);svg+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(TW-PR)+'" y2="'+gy+'" stroke="#2a3050" stroke-width="1"/><text x="'+(PL-5)+'" y="'+(gy+4)+'" text-anchor="end" font-family="monospace" font-size="9" fill="#6b7799">'+Math.round(gv/1000)+'k</text>';}
  // Zero line
  if(minV<0){var zy=toY(0);svg+='<line x1="'+PL+'" y1="'+zy+'" x2="'+(TW-PR)+'" y2="'+zy+'" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="4,3"/>';}
  // Bars for income
  for(var di=0;di<dayData.length;di++){var dd=dayData[di];if(dd.inc>0){var bx=PL+di*DW+1,bh=Math.round((dd.inc/rng)*CH),by=toY(dd.inc>0?dd.inc:0);svg+='<rect x="'+bx+'" y="'+Math.min(by,toY(0))+'" width="'+(DW-2)+'" height="'+Math.max(bh,2)+'" fill="#00d4aa" opacity="0.7" rx="1"/>';}}
  // Bars for outgoing
  for(var di=0;di<dayData.length;di++){var dd=dayData[di];if(dd.out>0){var bx=PL+di*DW+1,bh=Math.round((dd.out/rng)*CH),by=toY(0);svg+='<rect x="'+bx+'" y="'+by+'" width="'+(DW-2)+'" height="'+Math.max(bh,2)+'" fill="#ff6b6b" opacity="0.7" rx="1"/>';}}
  // Balance line
  var pts='';for(var di=0;di<dayData.length;di++){var cx=PL+di*DW+Math.floor(DW/2),cy=toY(dayData[di].run);pts+=cx+','+cy+' ';}
  svg+='<polyline points="'+pts+'" fill="none" stroke="#f7c948" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  // Dots only on days with events
  for(var di=0;di<dayData.length;di++){var dd=dayData[di];if(dd.inc>0||dd.out>0){var cx=PL+di*DW+Math.floor(DW/2),cy=toY(dd.run);svg+='<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#f7c948" stroke="#0f1117" stroke-width="1.5"/>';}}
  // X labels - every 7 days
  for(var di=0;di<dayData.length;di+=7){var dd=dayData[di],d=dd.d,dm=d.getMonth()+1,dday=d.getDate();svg+='<text x="'+(PL+di*DW+Math.floor(DW/2))+'" y="'+(H-4)+'" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7799">'+(dday<10?'0':'')+dday+'.'+(dm<10?'0':'')+dm+'.</text>';}
  // Today marker
  svg+='<line x1="'+PL+'" y1="'+PT+'" x2="'+PL+'" y2="'+(H-PB)+'" stroke="#4f7fff" stroke-width="1.5" stroke-dasharray="3,3"/><text x="'+(PL+3)+'" y="'+(PT+10)+'" font-family="monospace" font-size="8" fill="#4f7fff">Dnes</text>';
  svg+='</svg>';
  // Find critical days
  var critDays=[];
  for(var di=0;di<dayData.length;di++){var dd=dayData[di];if(dd.inc>0||dd.out>0){var d=dd.d,dm=d.getMonth()+1,dday=d.getDate(),lbl=(dday<10?'0':'')+dday+'.'+(dm<10?'0':'')+dm+'.';critDays.push({lbl:lbl,inc:dd.inc,out:dd.out,run:dd.run,items:dd.items});}}
  var critHtml='';
  if(critDays.length>0){
    critHtml='<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">';
    for(var ci=0;ci<critDays.length&&ci<15;ci++){var cd=critDays[ci];var col=cd.run>=0?'#00d4aa':'#ff6b6b';critHtml+='<div style="background:'+col+'18;border:1px solid '+col+'44;border-radius:8px;padding:8px 12px;min-width:120px;"><div style="font-family:DM Mono,monospace;font-size:0.75rem;font-weight:700;color:'+col+';">'+cd.lbl+'</div>';if(cd.inc)critHtml+='<div style="font-size:0.68rem;color:#00d4aa;">+ '+fmtK(cd.inc)+'</div>';if(cd.out)critHtml+='<div style="font-size:0.68rem;color:#ff6b6b;">- '+fmtK(cd.out)+'</div>';critHtml+='<div style="font-size:0.72rem;color:'+col+';font-weight:600;">'+fmtK(cd.run)+'</div></div>';}
    critHtml+='</div>';
  }
  return '<div class="sec" style="margin-bottom:16px;"><div class="sh"><div class="st">Denni cashflow — nasledujicich 60 dni</div></div><div class="sb" style="overflow-x:auto;">'+svg+'<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;font-size:0.72rem;color:var(--mu);"><div style="display:flex;align-items:center;gap:5px;"><div style="width:12px;height:8px;background:#00d4aa;border-radius:2px;"></div>Ocekavane prijmy</div><div style="display:flex;align-items:center;gap:5px;"><div style="width:12px;height:8px;background:#ff6b6b;border-radius:2px;"></div>Ocekavane vydaje</div><div style="display:flex;align-items:center;gap:5px;"><div style="width:12px;height:8px;background:#f7c948;border-radius:2px;"></div>Pohyblivy zustatek</div></div>'+critHtml+'</div></div>';
}

function ensureCF(){

function cfDoImportZ(buf){
  var wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true});
  var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});
  var hi=-1;
  for(var i=0;i<Math.min(8,rows.length);i++){
    var j=(rows[i]||[]).join('|').toUpperCase();
    if(j.indexOf('FIRMA')>=0&&j.indexOf('SPLATNO')>=0){hi=i;break;}
  }
  if(hi<0){alert('Nenalezena hlavička (Firma + Splatno).');return;}
  var hdr=rows[hi],iF=-1,iS=-1,iC=-1;
  for(var j=0;j<hdr.length;j++){
    if(!hdr[j])continue;
    var h=String(hdr[j]).toUpperCase().trim();
    if(h==='FIRMA'&&iF<0)iF=j;
    else if(h.indexOf('SPLATNO')>=0&&iS<0)iS=j;
    else if(h==='CELKEM'&&iC<0)iC=j;
  }
  if(iF<0||iS<0||iC<0){alert('Chybí sloupce Firma / Splatno / Celkem.');return;}
  var nove=[];
  for(var ri=hi+1;ri<rows.length;ri++){
    var r=rows[ri];
    if(!r||r[iF]==null)continue;
    var firma=String(r[iF]).trim();
    if(!firma||firma.toUpperCase()==='CELKEM')continue;
    var sv=r[iS],spl='';
    if(sv instanceof Date)spl=sv.toISOString().slice(0,10);
    else if(typeof sv==='number'&&sv>40000)spl=new Date(Math.round((sv-25569)*86400000)).toISOString().slice(0,10);
    else if(sv)spl=String(sv).slice(0,10);
    if(!spl)continue;
    var castka=parseFloat(r[iC])||0;
    if(castka<=0)continue;
    nove.push({id:'z'+ri,nazev:firma,splatnost:spl,castka:castka,zaplaceno:false});
  }
  dat.cfZ=nove;
  save();render();
  alert('✓ Závazky aktualizovány\n• '+nove.length+' položek\n• Celkem: '+fmtK(nove.reduce(function(s,z){return s+z.castka;},0)));
}

function cfList(){

  for(var k in dat.cfP)arr.push(dat.cfP[k]);
  arr.sort(function(a,b){return parseInt(a.cislo)-parseInt(b.cislo);});
  return arr;
}

function cfDoImport(buf){
  ensureCF();
  var wb=XLSX.read(new Uint8Array(buf),{type:'array',cellDates:true});
  var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:null});

  // Najdi hlavičku
  var hi=-1;
  for(var i=0;i<Math.min(8,rows.length);i++){
    var joined=(rows[i]||[]).join('|').toUpperCase();
    if(joined.indexOf('SPLATNOST')>=0&&joined.indexOf('DLUH')>=0){hi=i;break;}
  }
  if(hi<0){alert('Nenalezena hlavička (SPLATNOST + DLUH).');return;}

  // Sloupce
  var hdr=rows[hi],iN=-1,iS=-1,iD=-1;
  for(var j=0;j<hdr.length;j++){
    if(!hdr[j])continue;
    var h=String(hdr[j]).toUpperCase().replace(/\s/g,'');
    if((h==='NÁZEV'||h==='NAZEV')&&iN<0)iN=j;
    else if(h==='SPLATNOST'&&iS<0)iS=j;
    else if(h==='DLUH'&&iD<0)iD=j;
  }
  if(iN<0||iS<0||iD<0){alert('Chybí sloupce. Nalezeno: '+hdr.filter(Boolean).join(', '));return;}

  // Přečti všechny faktury z Excelu do mapy cislo->dluh
  var excelData={};
  for(var ri=hi+1;ri<rows.length;ri++){
    var r=rows[ri];
    if(!r||r[iN]==null)continue;
    var raw=String(r[iN]).trim();
    var m=raw.match(/^(\d+)\s+(.*)/);
    if(!m)continue;
    var cislo=m[1];
    var nazev=m[2].trim();
    var dluh=parseFloat(r[iD])||0;
    var sv=r[iS],spl='';
    if(sv instanceof Date)spl=sv.toISOString().slice(0,10);
    else if(typeof sv==='number'&&sv>40000)spl=new Date(Math.round((sv-25569)*86400000)).toISOString().slice(0,10);
    else if(sv)spl=String(sv).slice(0,10);
    if(!spl)continue;
    excelData[cislo]={nazev:nazev,splatnost:spl,dluh:dluh};
  }

  var zaplaceno=0,pridano=0,aktualizovano=0;

  // 1. Projdi existující — co má dluh=0 v Excelu → smaž
  for(var cislo in dat.cfP){
    if(excelData[cislo]!==undefined&&excelData[cislo].dluh===0){
      delete dat.cfP[cislo];
      zaplaceno++;
    } else if(excelData[cislo]!==undefined&&excelData[cislo].dluh>0){
      // Aktualizuj pokud se změnil dluh nebo splatnost
      var ex=dat.cfP[cislo],nd=excelData[cislo];
      if(Math.round(ex.dluh)!==Math.round(nd.dluh)||ex.splatnost!==nd.splatnost){
        ex.dluh=nd.dluh;ex.splatnost=nd.splatnost;ex.nazev=nd.nazev;aktualizovano++;
      }
    }
  }

  // 2. Přidej nové (ty co nejsou v dat.cfP)
  for(var cislo in excelData){
    if(!dat.cfP[cislo]&&excelData[cislo].dluh>0){
      var nd=excelData[cislo];
      dat.cfP[cislo]={cislo:cislo,nazev:nd.nazev,splatnost:nd.splatnost,dluh:nd.dluh};
      pridano++;
    }
  }

  save();render();
  alert('✓ Import dokončen:\n• '+zaplaceno+' faktur zaplaceno (smazáno)\n• '+pridano+' nových přidáno\n• '+aktualizovano+' aktualizováno');
}

function rCashflow(){

  var nezapl=faktury; // v dat.cfP jsou jen nezaplacené (zaplacené se smažou při importu)
  var pospl=nezapl.filter(function(f){return f.splatnost&&new Date(f.splatnost)<today;});
  var tP=nezapl.reduce(function(s,f){return s+f.dluh;},0);
  var tO=pospl.reduce(function(s,f){return s+f.dluh;},0);
  var nezavz=z.filter(function(f){return !f.zaplaceno;});
  var tZ=nezavz.reduce(function(s,f){return s+(+f.castka||0);},0);

  var lastBackupRaw=localStorage.getItem(SK+'_lastBackup');

  var daysSince=lastBackup?Math.floor((Date.now()-lastBackup.getTime())/86400000):null;
  var backupMsg=!lastBackup?'<span class="backup-warn">⚠️ Zatím nemáš uloženou žádnou zálohu!</span>':(daysSince>14?'<span class="backup-warn">⚠️ Poslední záloha před '+daysSince+' dny — doporuč zálohu obnovit.</span>':'✅ Poslední záloha: '+lastBackup.toLocaleDateString('cs-CZ'));
  var backupPanel='<div class="backup-panel"><div><div style="font-weight:800;font-family:Syne,sans-serif;margin-bottom:3px;">💾 Záloha dat</div><div style="font-size:0.84rem;color:var(--mu)">'+backupMsg+'</div></div><button class="btn bp bsm" onclick="expD()">💾 Stáhnout zálohu</button></div>';

  var nav='<div style="display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;align-items:center;justify-content:space-between;">'
    +'<div style="display:flex;gap:6px;">'
    +'<button class="stb'+(cfTab==='p'?' on':'')+'" onclick="cfTab=\'p\';render()">Přehled</button>'
    +'<button class="stb'+(cfTab==='ph'?' on':'')+'" onclick="cfTab=\'ph\';render()">Pohledávky ('+nezapl.length+')</button>'
    +'<button class="stb'+(cfTab==='z'?' on':'')+'" onclick="cfTab=\'z\';render()">Závazky</button>'
    +'</div>'
    +'<div><input type="file" id="cfXlsxInput" accept=".xlsx" style="display:none" onchange="cfHandleXlsx(event)">'
    +'<button class="btn bg bsm" onclick="cfImportXlsx()" style="border-color:#4f7fff;color:#4f7fff;">⬆ Aktualizovat z Excelu</button></div>'
    +'</div>';

  if(cfTab==='ph')return backupPanel+nav+rCFPohledavky(nezapl,pospl,tP,tO,bal,today);
  if(cfTab==='z')return backupPanel+nav+rCFZavazky(nezavz,tZ,today);
  return backupPanel+nav+rCFPrehled(nezapl,pospl,nezavz,bal,tP,tO,tZ,today);

  function diff(a,b,fn){var v=fn(a),p=b?fn(b):null;if(p===null)return'';var d=v-p,pct=p?(d/Math.abs(p)*100):0;return'<div class="cs '+(d>0?'up':d<0?'dn':'')+'">'+(d>=0?'+ ':'')+fmtK(d)+' ('+pct.toFixed(1)+'%)</div>';}

  // Karty
  var osobni=skupKc(last,'osobni'),investice=skupKc(last,'investice'),celkem=osobni+investice;
  var html='<div class="cards" style="margin-bottom:20px;">';

  html+='<div class="card" style="--c:#4f7fff"><div class="cl">Osobni majetek</div><div class="cv" style="color:#4f7fff">'+fmtK(osobni)+'</div>'+diff(last,prev,function(w){return skupKc(w,'osobni');})+'</div>';
  html+='<div class="card" style="--c:#a855f7"><div class="cl">Investice</div><div class="cv" style="color:#a855f7">'+fmtK(investice)+'</div>'+diff(last,prev,function(w){return skupKc(w,'investice');})+'</div>';
  html+='</div>';

  // Jednotlive ucty - posledni hodnoty
  var osobniUcty=UCTY.filter(function(u){return u.g==='osobni'||u.g==='investice';});
  html+='<div class="sec" style="margin-bottom:16px;"><div class="sh"><div class="st">Stav uctu</div><span style="font-size:0.78rem;color:var(--mu)">'+fmtD(last.datum)+'</span></div><div class="sb" style="padding:0;overflow-x:auto;"><table class="tbl"><thead><tr><th>Ucet</th><th>Skupina</th><th class="r">Aktualni stav</th><th class="r">Zmena</th></tr></thead><tbody>';
  for(var i=0;i<osobniUcty.length;i++){
    var u=osobniUcty[i];
    var val=ucetKc(last,u),pval=prev?ucetKc(prev,u):null;
    var d=pval!==null?val-pval:null;
    var gc=u.g==='investice'?'#a855f7':'#4f7fff';
    var gcl=u.g==='investice'?'Investice':'Osobni';
    html+='<tr><td><b>'+u.label+'</b>'+(u.sfx==='EUR'?' <span style="font-size:0.7rem;color:var(--mu)">(EUR × '+EUR+')</span>':'')+'</td>';
    html+='<td><span style="font-size:0.72rem;padding:2px 8px;border-radius:12px;background:'+gc+'22;color:'+gc+'">'+gcl+'</span></td>';
    html+='<td class="r" style="font-weight:700">'+fmtK(val)+'</td>';
    html+='<td class="r '+(d===null?'':(d>0?'up':d<0?'dn':''))+'">'+(d===null?'--':(d>=0?'+ ':'')+fmtK(d))+'</td></tr>';
  }
  html+='</tbody></table></div></div>';

  // Graf vyvoje
  if(wks.length>=2){
    var lines=[
      {c:'#e8eaf0',label:'Celkem',fn:function(w){return skupKc(w,'osobni')+skupKc(w,'investice');}},
      {c:'#4f7fff',label:'Osobni majetek',fn:function(w){return skupKc(w,'osobni');}},
      {c:'#a855f7',label:'Investice',fn:function(w){return skupKc(w,'investice');}}
    ];
    html+=buildChart(wks,lines,'Vyvoj osobniho majetku','ch_osobni');
  }
  return html;
}

function rFiremniFinance(){
  var wks=dat.weeks.slice().sort(function(a,b){return a.datum<b.datum?-1:1;});
  var last=wks[wks.length-1],prev=wks[wks.length-2];
  if(!last)return'<div class="nd">Zadne zaznamy. Pouzijte zalozku Zadat tyden.</div>';
  function diff(fn){var v=fn(last),p=prev?fn(prev):null;if(p===null)return'';var d=v-p,pct=p?(d/Math.abs(p)*100):0;return'<div class="cs '+(d>0?'up':d<0?'dn':'')+'">'+(d>=0?'+ ':'')+fmtK(d)+' ('+pct.toFixed(1)+'%)</div>';}

  var firemniUcty=UCTY.filter(function(u){return u.g==='firemni';});
  var celkem=skupKc(last,'firemni');

  // Karty
  var html='<div class="cards" style="margin-bottom:20px;">';
  html+='<div class="card c2"><div class="cl">Firemni majetek celkem</div><div class="cv" style="color:var(--a2)">'+fmtK(celkem)+'</div><div class="cs">'+fmtD(last.datum)+'</div>'+diff(function(w){return skupKc(w,'firemni');})+'</div>';
  for(var i=0;i<firemniUcty.length;i++){
    var u=firemniUcty[i],val=ucetKc(last,u);
    if(!val&&!prev)continue;
    html+='<div class="card"><div class="cl">'+u.label+'</div><div class="cv" style="color:var(--a2)">'+fmtK(val)+'</div></div>';
  }
  html+='</div>';

  // Tabulka uctu
  html+='<div class="sec" style="margin-bottom:16px;"><div class="sh"><div class="st">Stav firemnich uctu</div><span style="font-size:0.78rem;color:var(--mu)">'+fmtD(last.datum)+'</span></div><div class="sb" style="padding:0;overflow-x:auto;"><table class="tbl"><thead><tr><th>Ucet / Firma</th><th class="r">Aktualni stav</th><th class="r">Predchozi</th><th class="r">Zmena</th><th class="r">Podil</th></tr></thead><tbody>';
  for(var i=0;i<firemniUcty.length;i++){
    var u=firemniUcty[i];
    var val=ucetKc(last,u),pval=prev?ucetKc(prev,u):null;
    var d=pval!==null?val-pval:null;
    var podil=celkem?Math.round(val/celkem*100):0;
    html+='<tr>';
    html+='<td><b>'+u.label+'</b>'+(u.sfx==='EUR'?' <span style="font-size:0.7rem;color:var(--mu)">(EUR × '+EUR+')</span>':'')+'</td>';
    html+='<td class="r" style="font-weight:700;color:var(--a2)">'+fmtK(val)+'</td>';
    html+='<td class="r" style="color:var(--mu)">'+(pval!==null?fmtK(pval):'--')+'</td>';
    html+='<td class="r '+(d===null?'':(d>0?'up':d<0?'dn':''))+'">'+(d===null?'--':(d>=0?'+ ':'')+fmtK(d))+'</td>';
    html+='<td class="r"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end;"><span style="font-size:0.78rem;color:var(--mu)">'+podil+'%</span><div style="width:60px;height:6px;background:var(--bd);border-radius:3px;"><div style="width:'+podil+'%;height:100%;background:var(--a2);border-radius:3px;"></div></div></div></td>';
    html+='</tr>';
  }
  html+='</tbody></table></div></div>';

  // Graf vyvoje
  if(wks.length>=2){
    var lines=[
      {c:'#00d4aa',label:'Firemni majetek',fn:function(w){return skupKc(w,'firemni');}}
    ];
    html+=buildChart(wks,lines,'Vyvoj firemniho majetku','ch_firemni');
  }
  return html;
}
